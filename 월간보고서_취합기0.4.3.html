<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>월간보고서 취합기</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
  :root{
    --fg:#111827; --muted:#6b7280; --border:#d1d5db; --bg:#fff;
    --primary:#2563eb; --primary-hover:#1d4ed8;
    --ok:#059669; --warn:#d97706; --err:#dc2626;
    --soft:#f9fafb;
    --radius:8px;
  }
  *{box-sizing:border-box}
  body{font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       color:var(--fg);background:var(--bg);margin:0;padding:24px;line-height:1.5}
  h1{font-size:20px;margin:0 0 4px 0}
  .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .wrap{max-width:1080px;margin:0 auto}
  .dropzone{border:2px dashed var(--border);border-radius:var(--radius);
            padding:32px;text-align:center;cursor:pointer;background:var(--soft);
            transition:background .15s,border-color .15s}
  .dropzone.over{border-color:var(--primary);background:#eff6ff}
  .dropzone p{margin:6px 0;font-size:14px}
  .dropzone .big{font-size:15px;font-weight:600}
  .dropzone .small{color:var(--muted);font-size:12px}
  .row{display:flex;gap:8px;align-items:center;margin:16px 0;flex-wrap:wrap}
  button{background:var(--primary);color:#fff;border:0;padding:10px 16px;
         border-radius:6px;font-size:14px;cursor:pointer;font-weight:600}
  button:hover{background:var(--primary-hover)}
  button:disabled{background:#9ca3af;cursor:not-allowed}
  button.secondary{background:#fff;color:var(--fg);border:1px solid var(--border)}
  button.secondary:hover{background:var(--soft)}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
  th,td{border:1px solid var(--border);padding:6px 10px;text-align:left}
  th{background:var(--soft);font-weight:600}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
  .b-ok{background:#d1fae5;color:#065f46}
  .b-warn{background:#fef3c7;color:#92400e}
  .b-err{background:#fee2e2;color:#991b1b}
  .b-wait{background:#e5e7eb;color:#374151}
  #log{font-size:12px;color:var(--muted);background:var(--soft);
       border:1px solid var(--border);border-radius:6px;padding:10px;
       max-height:200px;overflow:auto;white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace}
  .info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;
        padding:10px 12px;font-size:13px;color:#1e3a8a;margin-top:8px}
  input[type=file]{display:none}
  /* === 좌우 분할 레이아웃 === */
  .split{display:flex;gap:16px;align-items:flex-start;margin-top:12px}
  .split > .left{flex:1 1 0;min-width:0}
  .split > .right{flex:0 0 360px;min-width:0}
  .split #tbl{margin-top:0}
  .split #log{margin:0;max-height:none;height:100%;min-height:320px}
  @media (max-width: 860px){
    .split{flex-direction:column}
    .split > .right{flex-basis:auto;width:100%}
    .split #log{min-height:160px;max-height:240px}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>월간보고서 취합기</h1>
  <div class="sub">12개 업체 리포트(.xlsx)를 드래그앤드롭하면 양식에 자동 취합되어 다운로드됩니다.</div>

  <div id="drop" class="dropzone" tabindex="0">
    <p class="big">파일을 여기에 드래그앤드롭</p>
    <p class="small">또는 클릭하여 선택 (.xlsx · 다중 선택 가능)</p>
    <input id="file" type="file" accept=".xlsx" multiple>
  </div>

  <div class="row">
    <button id="go" disabled>월간보고서 생성·다운로드</button>
    <button id="clear" class="secondary">초기화</button>
    <span id="count" class="small" style="color:var(--muted);font-size:13px"></span>
  </div>

  <div class="split">
    <div class="left">
      <table id="tbl">
        <thead><tr><th style="width:50px">#</th><th>업체</th><th>매칭 파일명</th><th style="width:120px">상태</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="info" id="period">통계 연월: 파일 업로드 시 자동 감지됩니다.</div>
    </div>
    <div class="right">
      <div id="log"></div>
    </div>
  </div>
</div>

/* === 상태 === */
const state = {
  files: {},   // 업체명 -> File
  unknown: [], // 매칭 실패 파일들
  period: null // {year, month, dateObj}
};

const $ = id => document.getElementById(id);
const drop = $("drop"), fileInput = $("file"), tbody = $("tbody"),
      goBtn = $("go"), clearBtn = $("clear"),
      logBox = $("log"), countEl = $("count"), periodEl = $("period");

function log(msg){ logBox.textContent += msg + "\n"; logBox.scrollTop = logBox.scrollHeight; }

/* ───────── 드래그앤드롭: 전역 + 드롭존 양쪽에서 기본동작 차단 ───────── */
/* (문제: 사용자가 드롭존을 살짝 벗어나 떨어뜨리면 브라우저가 파일을 새 탭에 엶) */
['dragenter','dragover','dragleave','drop'].forEach(ev=>{
  window.addEventListener(ev, e=>{
    e.preventDefault();
    e.stopPropagation();
  }, false);
  document.addEventListener(ev, e=>{
    e.preventDefault();
    e.stopPropagation();
  }, false);
});

drop.addEventListener('dragenter', e=>{
  e.preventDefault(); e.stopPropagation();
  drop.classList.add('over');
});
drop.addEventListener('dragover', e=>{
  e.preventDefault(); e.stopPropagation();
  if(e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
  drop.classList.add('over');
});
drop.addEventListener('dragleave', e=>{
  e.preventDefault(); e.stopPropagation();
  if(e.target === drop) drop.classList.remove('over');
});
drop.addEventListener('drop', e=>{
  e.preventDefault(); e.stopPropagation();
  drop.classList.remove('over');
  const files = e.dataTransfer ? Array.from(e.dataTransfer.files) : [];
  handleFiles(files);
});
drop.addEventListener('click', ()=> fileInput.click());
drop.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') fileInput.click(); });
fileInput.addEventListener('change', e=> handleFiles(Array.from(e.target.files)));

clearBtn.addEventListener('click', ()=>{
  state.files = {}; state.unknown = []; state.period = null;
  fileInput.value = ""; logBox.textContent = "";
  periodEl.textContent = "통계 연월: 파일 업로드 시 자동 감지됩니다.";
  render();
});

/* ───────── 파일명 → 업체 매칭 ───────── */
function matchCompany(filename){
  const base = filename.replace(/\.[xX][lL][sS][xX]$/,'');
  // ── 아트봉봉스쿨 별칭 처리: 파일명이 "아이스크림아트"로 끝나는 경우 ──
  if(base.endsWith('_아이스크림아트') || base.endsWith('아이스크림아트') || base.includes('아이스크림아트')){
    return "아트봉봉스쿨";
  }
  // 1) 정확 일치
  for(const c of COMPANIES){
    if(base.endsWith('_'+c) || base.endsWith(c)) return c;
  }
  // 2) 부분 포함
  for(const c of COMPANIES){
    if(base.includes(c)) return c;
  }
  return null;
}

function handleFiles(files){
  for(const f of files){
    if(!f.name.toLowerCase().endsWith('.xlsx')){
      log(`[skip] ${f.name} (xlsx 아님)`); continue;
    }
    const c = matchCompany(f.name);
    if(c){
      state.files[c] = f;
      log(`[ok] ${c} ← ${f.name}`);
    } else {
      state.unknown.push(f.name);
      log(`[?] 매칭 실패: ${f.name}`);
    }
  }
  render();
}

function render(){
  tbody.innerHTML = "";
  let n = 0;
  COMPANIES.forEach((c, i)=>{
    const f = state.files[c];
    if(f) n++;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${c}</td>
      <td>${f ? f.name : '<span style="color:var(--muted)">미업로드</span>'}</td>
      <td>${f ? '<span class="badge b-ok">준비</span>' : '<span class="badge b-wait">대기</span>'}</td>`;
    tbody.appendChild(tr);
  });
  state.unknown.forEach(name=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>-</td><td><span style="color:var(--err)">매칭 실패</span></td>
                    <td>${name}</td><td><span class="badge b-err">확인 필요</span></td>`;
    tbody.appendChild(tr);
  });
  countEl.textContent = `${n} / 12 업로드됨`;
  goBtn.disabled = n === 0;
}

/* ───────── base64 → ArrayBuffer ───────── */
function b64ToBuf(b64){
  const bin = atob(b64);
  const len = bin.length;
  const buf = new Uint8Array(len);
  for(let i=0;i<len;i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

/* ───────── 셀에 값/색상 쓰기 ───────── */
/** ExcelJS 셀 값 객체({formula,result} / richText / hyperlink 등)에서
 *  순수 값만 추출. 오류 수식은 null로 환원. */
function unwrapCellValue(v){
  if(v === null || v === undefined) return null;
  if(typeof v === 'object'){
    if(v.error !== undefined) return null;
    if(v.formula !== undefined || v.sharedFormula !== undefined || v.arrayFormula !== undefined){
      return unwrapCellValue(v.result);
    }
    if(Array.isArray(v.richText)) return v.richText.map(t => (t && t.text) || '').join('');
    if(v.hyperlink !== undefined && v.text !== undefined) return v.text;
    if(v instanceof Date) return v;
  }
  return v;
}

/** 0 또는 빈 셀이면 '-'로 표기 */
function toDisplay(v){
  if(v === null || v === undefined) return '-';
  if(typeof v === 'string'){
    const s = v.trim();
    if(s === '' || s === '0') return '-';
    return v;
  }
  if(typeof v === 'number' && v === 0) return '-';
  return v;
}

function setVal(ws, addr, value){
  const raw = unwrapCellValue(value);
  const cell = ws.getCell(addr);
  cell.value = toDisplay(raw);
}
/** 전월 대비 당월 증감에 따라 당월 셀 글자색 변경 (수치일 때만) */
function applyDelta(ws, prevAddr, currAddr, prevRaw, currRaw){
  // 원시 숫자값을 인자로 받음(setVal에서 0이 '-'로 치환된 후에도 비교 가능)
  const p = (prevRaw !== undefined) ? prevRaw : ws.getCell(prevAddr).value;
  const c = (currRaw !== undefined) ? currRaw : ws.getCell(currAddr).value;
  if(typeof p !== 'number' || typeof c !== 'number') return;
  let argb;
  if(c > p) argb = 'FFFF0000';
  else if(c < p) argb = 'FF0000FF';
  else argb = 'FF000000';

  const cell = ws.getCell(currAddr);
  // 공유 스타일에서 분리: style 트리를 깊은 복사한 뒤 font.color만 교체
  const newStyle = JSON.parse(JSON.stringify(cell.style || {}));
  newStyle.font = Object.assign({}, newStyle.font || {}, { color: { argb } });
  cell.style = newStyle;   // ← font만 따로 대입하지 말고 style 전체를 새 객체로 대입
}

/* ───────── 통계연월 추출 ───────── */
function readPeriod(reportWB){
  const ws = reportWB.getWorksheet('월간 리포트 템플릿') || reportWB.worksheets[0];
  const v = ws.getCell('E5').value;
  let d = null;
  if(v instanceof Date) d = v;
  else if(v && v.result instanceof Date) d = v.result;
  else if(typeof v === 'string'){
    const m = v.match(/(\d{4})[-./](\d{1,2})/);
    if(m) d = new Date(parseInt(m[1]), parseInt(m[2])-1, 1);
  }
  if(!d) return null;
  return {year:d.getFullYear(), month:d.getMonth()+1, dateObj:d};
}

/* ───────── 리포트 1개를 양식에 반영 ───────── */
async function applyReport(company, file, formWB){
  const buf = await file.arrayBuffer();
  const rwb = new ExcelJS.Workbook();
  await rwb.xlsx.load(buf);
  const rws = rwb.getWorksheet('월간 리포트 템플릿') || rwb.worksheets[0];

  // 통계연월 (첫 파일에서만 채택)
  if(!state.period){
    const p = readPeriod(rwb);
    if(p){
      state.period = p;
      log(`[period] 통계연월 감지: ${p.year}-${String(p.month).padStart(2,'0')} (from ${company})`);
    }
  }

  // 시트1 (대시보드): 행4~15 중 해당 업체 행
  const idx = COMPANIES.indexOf(company);
  const dashRow = 4 + idx; // 4부터 시작
  const ws1 = formWB.getWorksheet('1.대시보드');
  setVal(ws1, 'C'+dashRow, rws.getCell('E6').value);   // 담당자명 (양식 E6)
  setVal(ws1, 'E'+dashRow, rws.getCell('E9').value);   // 가동률
  setVal(ws1, 'F'+dashRow, rws.getCell('E10').value);  // 장애 건수
  setVal(ws1, 'G'+dashRow, rws.getCell('E11').value);  // 장애 시간
  setVal(ws1, 'H'+dashRow, rws.getCell('E13').value);  // CS 접수
  setVal(ws1, 'I'+dashRow, rws.getCell('E14').value);  // CS 처리

  // 시트2 (정량지표): 명시적 컬럼 매핑
  const ws2 = formWB.getWorksheet('2.정량지표');
  const col = COL_MAP[company];
  if(!col){ log(`[err] COL_MAP에 ${company} 없음`); return; }
  for(const [rRow, fRow] of QUANT_ROW_MAP){
    const prevAddr = col.prev + fRow;
    const currAddr = col.curr + fRow;
    const prevRaw = unwrapCellValue(rws.getCell('D'+rRow).value);
    const currRaw = unwrapCellValue(rws.getCell('E'+rRow).value);
    setVal(ws2, prevAddr, prevRaw);
    setVal(ws2, currAddr, currRaw);
    applyDelta(ws2, prevAddr, currAddr, prevRaw, currRaw);
  }

  // 시트3 (서술형): 행4~15
  const ws3 = formWB.getWorksheet('3.서술형_업데이트·이슈');
  const narrRow = 4 + idx;
  setVal(ws3, 'B'+narrRow, rws.getCell('E7').value);   // 콘텐츠 업데이트
  setVal(ws3, 'C'+narrRow, rws.getCell('E8').value);   // 플랫폼 업데이트
  setVal(ws3, 'D'+narrRow, rws.getCell('E12').value);  // CS 이슈
}

/* ───────── 메인 처리 ───────── */
goBtn.addEventListener('click', async ()=>{
  goBtn.disabled = true; goBtn.textContent = "처리 중…";
  state.period = null;
  try{
    const formWB = new ExcelJS.Workbook();
    await formWB.xlsx.load(b64ToBuf(TEMPLATE_B64));
    log("[start] 양식 로드 완료");

    for(const c of COMPANIES){
      const f = state.files[c];
      if(!f){ log(`[skip] ${c} 미업로드`); continue; }
      try{
        await applyReport(c, f, formWB);
        log(`[done] ${c}`);
      }catch(e){
        log(`[err] ${c}: ${e.message}`);
      }
    }

    // 통계연월을 양식 곳곳에 반영
    let ym = "", fnamePart = "인공지능교육서비스_월간통계보고서";
    if(state.period){
      const {year, month, dateObj} = state.period;
      const yy = String(year).slice(2);
      ym = `${year}-${String(month).padStart(2,'0')}`;
      fnamePart = `(${yy}년${String(month).padStart(2,'0')}월)인공지능교육서비스_월간통계보고서`;
      periodEl.textContent = `통계 연월: ${ym}`;

      // 시트1 I2 (날짜)
      const ws1 = formWB.getWorksheet('1.대시보드');
      ws1.getCell('I2').value = dateObj;

      // 시트2 A1 (타이틀의 연월)
      const ws2 = formWB.getWorksheet('2.정량지표');
      const a1 = ws2.getCell('A1').value;
      if(typeof a1 === 'string') ws2.getCell('A1').value = a1.replace(/\(\d{4}-\d{2}\)/, `(${ym})`);

      // 시트3 A1
      const ws3 = formWB.getWorksheet('3.서술형_업데이트·이슈');
      const a3 = ws3.getCell('A1').value;
      if(typeof a3 === 'string') ws3.getCell('A1').value = a3.replace(/\(\d{4}-\d{2}\)/, `(${ym})`);
    }

    // 다운로드
    const out = await formWB.xlsx.writeBuffer();
    const blob = new Blob([out], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fnamePart + ".xlsx";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 1000);
    log(`[done] 다운로드: ${a.download}`);
  }catch(e){
    log(`[fatal] ${e.message}`);
    alert("처리 중 오류: " + e.message);
  }finally{
    goBtn.disabled = false; goBtn.textContent = "월간보고서 생성·다운로드";
  }
});

render();
</script>
